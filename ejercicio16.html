<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 16 - Calculadora con Funciones Flecha</title>
    <link rel="stylesheet" href="css/ejercicio16.css">
    <!-- SweetAlert2-->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="contenedor-conversor">
        <h1>Calculadora</h1>
        <p class="subtitulo">Operaciones básicas con funciones</p>

        <div class="grupo-doble">
            <div class="grupo-formulario">
                <label for="numero1">Número 1</label>
                <input type="text" id="numero1" placeholder="Ej: 10">
            </div>
            <div class="grupo-formulario">
                <label for="numero2">Número 2</label>
                <input type="text" id="numero2" placeholder="Ej: 5">
            </div>
        </div>

        <div class="grupo-botones">
            <button type="button" class="boton-operacion" onclick="calcularOperacion('suma')">+</button>
            <button type="button" class="boton-operacion" onclick="calcularOperacion('resta')">−</button>
            <button type="button" class="boton-operacion" onclick="calcularOperacion('multiplicacion')">×</button>
            <button type="button" class="boton-operacion" onclick="calcularOperacion('division')">÷</button>
        </div>

        <div class="grupo-formulario">
            <label for="resultado">Resultado</label>
            <input type="text" id="resultado" readonly placeholder="Resultado">
        </div>
    </div>

    <script src="js/ejercicio16.js"></script>
</body>
</html>
